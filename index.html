<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=list_alt_add" />
        <link rel="shortcut icon" href="images/clipboard-list-solid-full.svg" type="image/x-icon">
</head>

<body>

    <div class="container mt-5">
        <div class="card p-3 align-items-center bg-light">
            <h1 class="mb-5 fw-bold">Tu lista de tareas</h1>
            <div class="d-flex mb-5 align-items-center">
                <input id="inputTarea" type="text" class="form-control" placeholder="Ingresa tu nueva tarea">
                <button id="btnTarea" class="btn btn-success w-75 d-flex align-items-center justify-content-center">Crear Tarea<span class="material-symbols-outlined ms-2">
                        list_alt_add
                    </span></button>
            </div>
            <div id="tareas" class="w-100 d-flex flex-column align-items-center ">

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
</body>

</html>
